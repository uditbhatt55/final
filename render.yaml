services:
  - type: web
    name: sign-language-ai
    env: docker
    plan: free
    # Using Docker runtime - Render will build the Dockerfile at repo root
    buildCommand: docker build -t sign-language-ai:latest .
    startCommand: docker run -p $PORT:5000 sign-language-ai:latest
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
